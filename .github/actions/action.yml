name: 'Kernel Config Injector'
description: 'Injects kernel pillars using bash loops'
inputs:
  defconfig_path:
    required: true
  include_susfs:
    default: 'false'
  is_xxksu:
    default: 'false'

runs:
  using: "composite"
  steps:
    - name: Inject Networking and System Pillars
      shell: bash
      run: |
        NET_PILLARS=(
          "CONFIG_NETFILTER_ADVANCED=y" "CONFIG_IP_NF_TARGET_TTL=y" "CONFIG_IP6_NF_TARGET_HL=y"
          "CONFIG_IP6_NF_MATCH_HL=y" "CONFIG_BPF_STREAM_PARSER=y" "CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y"
          "CONFIG_NETFILTER_XT_TARGET_TPROXY=y" "CONFIG_NETFILTER_XT_TARGET_REDIRECT=y"
          "CONFIG_NETFILTER_XT_MATCH_SOCKET=y" "CONFIG_NETFILTER_XT_MATCH_MARK=y"
          "CONFIG_NETFILTER_XT_MATCH_IPRANGE=y" "CONFIG_NETFILTER_XT_MATCH_OWNER=y"
          "CONFIG_NETFILTER_XT_MATCH_MAC=y" "CONFIG_NETFILTER_XT_MATCH_CONNTRACK=y"
          "CONFIG_NETFILTER_XT_MARK=y" "CONFIG_NETFILTER_XT_CONNMARK=y"
          "CONFIG_NETFILTER_XT_TARGET_CONNMARK=y" "CONFIG_IP6_NF_NAT=y"
          "CONFIG_IP6_NF_TARGET_REDIRECT=y" "CONFIG_IP6_NF_TARGET_MASQUERADE=y"
          "CONFIG_IP_MULTIPLE_TABLES=y" "CONFIG_IPV6_MULTIPLE_TABLES=y"
          "CONFIG_XFRM_ALGO=y" "CONFIG_INET_IPCOMP=y" "CONFIG_INET_XFRM_TUNNEL=y"
          "CONFIG_INET_ESP=y" "CONFIG_XFRM_USER=y" "CONFIG_XFRM_SUB_POLICY=y"
          "CONFIG_INET_XFRM_MODE_TUNNEL=y" "CONFIG_XFRM_STATISTICS=y"
          "CONFIG_IP_SET=y" "CONFIG_NETFILTER_XT_SET=y" "CONFIG_IP_SET_MAX=65534"
          "CONFIG_IP_SET_BITMAP_IP=y" "CONFIG_IP_SET_BITMAP_IPMAC=y" "CONFIG_IP_SET_BITMAP_PORT=y"
          "CONFIG_IP_SET_HASH_IP=y" "CONFIG_IP_SET_HASH_IPMARK=y" "CONFIG_IP_SET_HASH_IPPORT=y"
          "CONFIG_IP_SET_HASH_IPPORTIP=y" "CONFIG_IP_SET_HASH_IPPORTNET=y"
          "CONFIG_IP_SET_HASH_IPMAC=y" "CONFIG_IP_SET_HASH_MAC=y" "CONFIG_IP_SET_HASH_NETPORTNET=y"
          "CONFIG_IP_SET_HASH_NET=y" "CONFIG_IP_SET_HASH_NETNET=y" "CONFIG_IP_SET_HASH_NETPORT=y"
          "CONFIG_IP_SET_HASH_NETIFACE=y" "CONFIG_IP_SET_LIST_SET=y"
          "CONFIG_TCP_CONG_ADVANCED=y" "CONFIG_TCP_CONG_BBR=y" "CONFIG_NET_SCH_FQ=y"
          "CONFIG_DEFAULT_BBR=y" "CONFIG_SECURITY_NETWORK=y" "CONFIG_CGROUPS=y"
          "CONFIG_CGROUP_BPF=y" "CONFIG_CGROUP_SCHED=y" "CONFIG_CGROUP_PIDS=y"
          "CONFIG_CGROUP_FREEZER=y" "CONFIG_INOTIFY_USER=y" "CONFIG_TMPFS_POSIX_ACL=y"
          "CONFIG_TMPFS_INODE64=y"
        )
        for cfg in "${NET_PILLARS[@]}"; do
          echo "$cfg" >> ${{ inputs.defconfig_path }}
        done

    - name: Inject SUSFS Pillars
      if: ${{ inputs.include_susfs == 'true' }}
      shell: bash
      run: |
        SUSFS_PILLARS=(
          "CONFIG_KSU_SUSFS=y" "CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y"
          "CONFIG_KSU_SUSFS_SUS_PATH=y" "CONFIG_KSU_SUSFS_SUS_MOUNT=y"
          "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y"
          "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y" "CONFIG_KSU_SUSFS_SUS_KSTAT=y"
          "CONFIG_KSU_SUSFS_SUS_OVERLAYFS=y" "CONFIG_KSU_SUSFS_TRY_UMOUNT=y"
          "CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y"
          "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y"
          "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y" "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y"
        )
        for cfg in "${SUSFS_PILLARS[@]}"; do
          echo "$cfg" >> ${{ inputs.defconfig_path }}
        done

    - name: Inject xxKSU Pillars
      if: ${{ inputs.is_xxksu == 'true' }}
      shell: bash
      run: |
        XXKSU_PILLARS=(
          "CONFIG_KSU_TAMPER_SYSCALL_TABLE=y" "CONFIG_KSU_LSM_SECURITY_HOOKS=y"
          "CONFIG_KSU_THRONE_TRACKER_ALWAYS_THREADED=y"
        )
        for cfg in "${XXKSU_PILLARS[@]}"; do
          echo "$cfg" >> ${{ inputs.defconfig_path }}
        done

    - name: Configuration Cleanup
      shell: bash
      run: |
        DISABLE_LIST=("CONFIG_TCP_CONG_BIC" "CONFIG_TCP_CONG_WESTWOOD" "CONFIG_TCP_CONG_HTCP")
        for cfg in "${DISABLE_LIST[@]}"; do
          sed -i "s/$cfg=y/$cfg=n/" ${{ inputs.defconfig_path }}
        done
        sed -i '/CONFIG_KPROBES/d' ${{ inputs.defconfig_path }}
        echo "# CONFIG_KPROBES is not set" >> ${{ inputs.defconfig_path }}
        echo "CONFIG_WERROR=n" >> ${{ inputs.defconfig_path }}
