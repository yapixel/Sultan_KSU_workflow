name: Publish Sultan Release

on:
  workflow_run:
    workflows: ["Build Unified Pixel Kernel — Sultan Matrix"]
    types:
      - completed

permissions:
  contents: write
  actions: read

jobs:
  publish:
    name: Gather and Release
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ github.event.workflow_run.id }}
          path: zips
          merge-multiple: true
          github-token: ${{ github.token }}

      - name: Generate Release Metadata
        run: |
          DATE_STR=$(date +"%Y%m%d")
          RUN_NUMBER=${{ github.event.workflow_run.run_number }}
          SHORT_SHA=${{ github.event.workflow_run.head_sha }}
          SHORT_SHA=${SHORT_SHA:0:7}

          # Clean release tag: 20260415-r123
          TAG="\( {DATE_STR}-r \){RUN_NUMBER}"

          echo "RELEASE_TAG=$TAG" >> $GITHUB_ENV
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_ENV

          cat <<EOF > body.md
          ### Sultan Kernel Matrix Release

          **Build Number**: #${RUN_NUMBER}  
          **Branch**: ${{ github.event.workflow_run.head_branch }}  
          **Commit**: \`${SHORT_SHA}\`  
          **Date**: $(date +"%Y-%m-%d")  
          **Compiler**: GCC 14.2.0 (Non-LTO)

          | Variant          | KSU Implementation | SUSFS Support |
          |------------------|--------------------|---------------|
          | **xxKSU-SUSFS**  | Trijal08           | Integrated    |
          | **xxKSU**        | backslashxx        | None          |
          | **KowSU-SUSFS**  | KOWX712            | Patched       |

          Automatically generated from the successful build workflow.
          EOF

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ env.RELEASE_TAG }}" zips/*.zip \
            --title "Sultan Matrix - ${{ env.RELEASE_TAG }}" \
            --notes-file body.md \
            --draft=false \
            --prerelease=false