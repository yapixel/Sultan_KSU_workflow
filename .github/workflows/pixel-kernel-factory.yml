name: Build Unified Pixel Kernel — Sultan Matrix

on:
  workflow_dispatch:

env:
  ANYKERNEL_REPO: https://github.com/WildKernels/AnyKernel3.git
  PATCHES_REPO: https://github.com/yapixel/kernel_patches
  SCRIPTS_REPO: https://github.com/TheSillyOk/sh
  SUSFS_REPO: https://gitlab.com/simonpunk/susfs4ksu
  GCC_VERSION: "14.2.0"
  GCC_ARCHIVE_URL: "https://kernel.org/pub/tools/crosstool/files/bin/x86_64/14.2.0/x86_64-gcc-14.2.0-nolibc-aarch64-linux.tar.gz"
  KBUILD_BUILD_USER: "build-user"
  KBUILD_BUILD_HOST: "build-host"

jobs:
  build-xxksu:
    name: ${{ matrix.variant_name }} (${{ matrix.codename }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        codename: [gs201, zuma, zumapro]
        include_susfs: [true, false]
        include:
          - include_susfs: true
            variant_name: "xxKSU-SUSFS"
            kernel_repo: "https://github.com/Trijal08/anaconda_kernel_google_tensynos"
            kernel_branch: "anaconda-tensynos-qpr3"
            ksu_repo: "https://github.com/Trijal08/KernelSU"
            ksu_branch: "master-susfs"
          - include_susfs: false
            variant_name: "xxKSU"
            kernel_repo: "https://github.com/kerneltoast/android_kernel_google_tensynos"
            kernel_branch: "16.0.0-sultan"
            ksu_repo: "https://github.com/backslashxx/KernelSU"
            ksu_branch: "master"
          - codename: gs201
            defconfig: gs201_defconfig
          - codename: zuma
            defconfig: zuma_defconfig
          - codename: zumapro
            defconfig: zumapro_defconfig

    steps:
      - uses: actions/checkout@v4

      - name: Setup Toolchain
        run: |
          wget -q "${{ env.GCC_ARCHIVE_URL }}" -O gcc.tar.gz
          tar -xf gcc.tar.gz
          echo "GCC_PATH=$PWD/gcc-${{ env.GCC_VERSION }}-nolibc/aarch64-linux/bin/aarch64-linux-" >> "$GITHUB_ENV"

      - name: Clone Components
        run: |
          git clone --depth=1 "${{ matrix.kernel_repo }}" -b "${{ matrix.kernel_branch }}" sultan
          if [[ "${{ matrix.include_susfs }}" == "true" ]]; then
            git -C sultan submodule update --init --recursive --depth=1
          fi
          git clone --depth=1 "${{ matrix.ksu_repo }}" -b "${{ matrix.ksu_branch }}" KernelSU
          git clone --depth=1 "${{ env.ANYKERNEL_REPO }}" -b "sultan-${{ matrix.codename }}" AK3
          git clone --depth=1 "${{ env.PATCHES_REPO }}" kernel_patches
          git clone --depth=1 "${{ env.SCRIPTS_REPO }}" sh

      - name: Integration & Patching
        run: |
          cd sultan
          patch -p1 < ../kernel_patches/sultan/60_scripts_mkcompile_h.patch || true
          patch -p1 < ../kernel_patches/sultan/61_scripts_setlocalversion.patch || true
          patch -p1 < ../kernel_patches/sultan/62_init_Makefile.patch || true

          ln -sf ../../KernelSU/kernel drivers/kernelsu
          sed -i '/endmenu/i source "drivers/kernelsu/Kconfig"' drivers/Kconfig
          echo 'obj-$(CONFIG_KSU) += kernelsu/' >> drivers/Makefile

      - name: Metadata Extraction
        id: meta
        run: |
          S_TAG=$(git -C sultan rev-parse --short HEAD)
          chmod +x ./sh/get_ksuver.sh
          KSU_ORG=$(echo "${{ matrix.ksu_repo }}" | cut -d'/' -f4)
          K_VER=$(./sh/get_ksuver.sh "$KSU_ORG" "KernelSU" "${{ matrix.ksu_branch }}" || echo "unknown")
          if [ "${{ matrix.include_susfs }}" = "true" ]; then
            S_VER=$(grep -m1 'define SUSFS_VERSION' sultan/include/linux/susfs.h | grep -oP '".*?"' | tr -d '"' || echo "integrated")
          else
            S_VER="none"
          fi
          echo "s_tag=$S_TAG" >> "$GITHUB_OUTPUT"
          echo "ksu_ver=$K_VER" >> "$GITHUB_OUTPUT"
          echo "susfs_ver=$S_VER" >> "$GITHUB_OUTPUT"

      - name: Compilation
        working-directory: sultan
        run: |
          export CROSS_COMPILE=${{ env.GCC_PATH }}
          export CC=${{ env.GCC_PATH }}gcc
          make O=out ${{ matrix.defconfig }}

          DEFCONFIG="out/.config"

          cat <<EOF >> "$DEFCONFIG"
          # KernelSU Core (Source Integrated)
          CONFIG_KSU=y
          # CONFIG_KSU_KPROBES_HOOK is not set
          # CONFIG_KSU_DEBUG is not set
          # CONFIG_KSU_ALLOWLIST_WORKAROUND is not set

          # atp4pixel Networking & System Pillars
          CONFIG_NETFILTER_ADVANCED=y
          CONFIG_IP_NF_TARGET_TTL=y
          CONFIG_IP6_NF_TARGET_HL=y
          CONFIG_IP6_NF_MATCH_HL=y
          CONFIG_BPF_STREAM_PARSER=y
          CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y
          CONFIG_NETFILTER_XT_TARGET_TPROXY=y
          CONFIG_NETFILTER_XT_TARGET_REDIRECT=y
          CONFIG_NETFILTER_XT_MATCH_SOCKET=y
          CONFIG_NETFILTER_XT_MATCH_MARK=y
          CONFIG_NETFILTER_XT_MATCH_IPRANGE=y
          CONFIG_NETFILTER_XT_MATCH_OWNER=y
          CONFIG_NETFILTER_XT_MATCH_MAC=y
          CONFIG_NETFILTER_XT_MATCH_CONNTRACK=y
          CONFIG_NETFILTER_XT_MARK=y
          CONFIG_NETFILTER_XT_CONNMARK=y
          CONFIG_NETFILTER_XT_TARGET_CONNMARK=y
          CONFIG_IP6_NF_NAT=y
          CONFIG_IP6_NF_TARGET_REDIRECT=y
          CONFIG_IP6_NF_TARGET_MASQUERADE=y
          CONFIG_IP_MULTIPLE_TABLES=y
          CONFIG_IPV6_MULTIPLE_TABLES=y
          CONFIG_XFRM_ALGO=y
          CONFIG_INET_IPCOMP=y
          CONFIG_INET_XFRM_TUNNEL=y
          CONFIG_INET_ESP=y
          CONFIG_XFRM_USER=y
          CONFIG_XFRM_SUB_POLICY=y
          CONFIG_INET_XFRM_MODE_TUNNEL=y
          CONFIG_XFRM_STATISTICS=y
          CONFIG_IP_SET=y
          CONFIG_NETFILTER_XT_SET=y
          CONFIG_IP_SET_MAX=65534
          CONFIG_IP_SET_BITMAP_IP=y
          CONFIG_IP_SET_BITMAP_IPMAC=y
          CONFIG_IP_SET_BITMAP_PORT=y
          CONFIG_IP_SET_HASH_IP=y
          CONFIG_IP_SET_HASH_IPMARK=y
          CONFIG_IP_SET_HASH_IPPORT=y
          CONFIG_IP_SET_HASH_IPPORTIP=y
          CONFIG_IP_SET_HASH_IPPORTNET=y
          CONFIG_IP_SET_HASH_IPMAC=y
          CONFIG_IP_SET_HASH_MAC=y
          CONFIG_IP_SET_HASH_NETPORTNET=y
          CONFIG_IP_SET_HASH_NET=y
          CONFIG_IP_SET_HASH_NETNET=y
          CONFIG_IP_SET_HASH_NETPORT=y
          CONFIG_IP_SET_HASH_NETIFACE=y
          CONFIG_IP_SET_LIST_SET=y
          CONFIG_TCP_CONG_ADVANCED=y
          CONFIG_TCP_CONG_BBR=y
          CONFIG_NET_SCH_FQ=y
          CONFIG_DEFAULT_BBR=y
          CONFIG_SECURITY_NETWORK=y
          CONFIG_CGROUPS=y
          CONFIG_CGROUP_BPF=y
          CONFIG_CGROUP_SCHED=y
          CONFIG_CGROUP_PIDS=y
          CONFIG_CGROUP_FREEZER=y
          CONFIG_INOTIFY_USER=y
          CONFIG_TMPFS_POSIX_ACL=y
          CONFIG_TMPFS_INODE64=y
          EOF

          if [[ "${{ matrix.include_susfs }}" == "true" ]]; then
            cat <<EOF >> "$DEFCONFIG"
          # SUSFS Stealth Pillars
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT=y
          CONFIG_KSU_SUSFS_SUS_OVERLAYFS=y
          CONFIG_KSU_SUSFS_TRY_UMOUNT=y
          CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
          CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y
          CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
          EOF
          fi

          cat <<EOF >> "$DEFCONFIG"
          # xxKSU Hookless Pillars
          CONFIG_KSU_TAMPER_SYSCALL_TABLE=y
          CONFIG_KSU_LSM_SECURITY_HOOKS=y
          CONFIG_KSU_THRONE_TRACKER_ALWAYS_THREADED=y
          EOF

          sed -i 's/CONFIG_TCP_CONG_BIC=y/CONFIG_TCP_CONG_BIC=n/' "$DEFCONFIG"
          sed -i 's/CONFIG_TCP_CONG_WESTWOOD=y/CONFIG_TCP_CONG_WESTWOOD=n/' "$DEFCONFIG"
          sed -i 's/CONFIG_TCP_CONG_HTCP=y/CONFIG_TCP_CONG_HTCP=n/' "$DEFCONFIG"
          sed -i '/CONFIG_KPROBES/d' "$DEFCONFIG"
          echo "# CONFIG_KPROBES is not set" >> "$DEFCONFIG"
          echo "CONFIG_WERROR=n" >> "$DEFCONFIG"

          make O=out CROSS_COMPILE="$CROSS_COMPILE" CC="$CC" olddefconfig
          make O=out CROSS_COMPILE="$CROSS_COMPILE" CC="$CC" -j"$(nproc --all)"

      - name: Packaging
        run: |
          cp sultan/out/arch/arm64/boot/Image.lz4 AK3/Image.lz4 || cp sultan/out/arch/arm64/boot/Image AK3/Image
          if [ -d "sultan/out/google-devices/${{ matrix.codename }}/dts" ]; then
            cat sultan/out/google-devices/${{ matrix.codename }}/dts/*.dtb > AK3/dtb
          else
            cat sultan/out/arch/arm64/boot/dts/google/*.dtb > AK3/dtb
          fi
          STAG="${{ steps.meta.outputs.s_tag }}"
          KVER="${{ steps.meta.outputs.ksu_ver }}"
          SVER="${{ steps.meta.outputs.susfs_ver }}"
          if [[ "${{ matrix.variant_name }}" == "xxKSU" ]]; then
            ZIP_NAME="Sultan-${{ matrix.codename }}-${STAG}-xxKSU-r${KVER}.zip"
          else
            ZIP_NAME="Sultan-${{ matrix.codename }}-${STAG}-xxKSU-SUSFS-r${KVER}-SUSFS-${SVER}.zip"
          fi
          cd AK3 && zip -r9 "../${ZIP_NAME}" . -x "*.git*"
          echo "ZIP_NAME=${ZIP_NAME}" >> "$GITHUB_ENV"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.variant_name }}-${{ matrix.codename }}
          path: ${{ env.ZIP_NAME }}
          retention-days: 1

  build-kowsu:
    name: ${{ matrix.variant_name }} (${{ matrix.codename }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - codename: gs201
            variant_name: "KowSU-SUSFS"
            kernel_repo: "https://github.com/kerneltoast/android_kernel_google_tensynos"
            kernel_branch: "16.0.0-sultan"
