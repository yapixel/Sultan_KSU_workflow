name: Build Sultan + xxKSU

on:
  workflow_dispatch:

env:
  ANYKERNEL_REPO: https://github.com/TheWildJames/AnyKernel3.git
  PATCHES_REPO: https://github.com/yapixel/kernel_patches
  SCRIPTS_REPO: https://github.com/TheSillyOk/sh
  KSU_REPO: backslashxx/KernelSU
  KSU_BRANCH: master
  GCC_VERSION: "14.2.0"
  GCC_ARCHIVE_URL: >-
    https://kernel.org/pub/tools/crosstool/files/bin/x86_64/14.2.0/x86_64-gcc-14.2.0-nolibc-aarch64-linux.tar.gz

jobs:
  build:
    name: Build ${{ matrix.device_label }} Kernel — Sultan + xxKSU
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - codename: zuma
            kernel_version: "6.1.145"
            kernel_branch: 16.0.0-sultan
            kernel_repo: https://github.com/kerneltoast/android_kernel_google_tensynos
            anykernel_branch: sultan-zuma
            defconfig: zuma_defconfig
            dtb_path: google-devices/zuma/dts
            device_label: zuma

          - codename: gs201
            kernel_version: "6.1.145"
            kernel_branch: 16.0.0-sultan
            kernel_repo: https://github.com/kerneltoast/android_kernel_google_tensynos
            anykernel_branch: sultan-gs201
            defconfig: gs201_defconfig
            dtb_path: google-devices/gs201/dts
            device_label: gs201

          - codename: zumapro
            kernel_version: "6.1.145"
            kernel_branch: 16.0.0-sultan
            kernel_repo: https://github.com/kerneltoast/android_kernel_google_tensynos
            anykernel_branch: sultan-zumapro
            defconfig: zumapro_defconfig
            dtb_path: google-devices/zumapro/dts
            device_label: zumapro

    outputs:
      sultan_tag:    ${{ steps.meta.outputs.sultan_tag }}
      ksu_ver:       ${{ steps.meta.outputs.ksu_ver }}
      zip_name:      ${{ steps.package.outputs.zip_name }}
      artifact_name: ${{ steps.package.outputs.artifact_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install GCC ${{ env.GCC_VERSION }}
        run: |
          wget -q "${{ env.GCC_ARCHIVE_URL }}" -O gcc.tar.gz
          tar -xf gcc.tar.gz
          GCC_BIN="$PWD/gcc-${{ env.GCC_VERSION }}-nolibc/aarch64-linux/bin/aarch64-linux-"
          echo "GCC_PATH=${GCC_BIN}" >> "$GITHUB_ENV"

      - name: Clone source
        run: |
          git clone --depth=1 "${{ matrix.kernel_repo }}" -b "${{ matrix.kernel_branch }}" sultan
          git clone --depth=1 "${{ env.ANYKERNEL_REPO }}" -b "${{ matrix.anykernel_branch }}" AK3
          git clone --depth=1 "${{ env.PATCHES_REPO }}" kernel_patches
          git clone --depth=1 "${{ env.SCRIPTS_REPO }}" sh

      - name: Collect Metadata
        id: meta
        run: |
          SULTAN_TAG=$(git -C sultan tag --sort=-committerdate | head -n1)
          KSU_VER=$(./sh/get_ksuver.sh "backslashxx" "KernelSU" "${{ env.KSU_BRANCH }}" || echo "unknown")
          echo "sultan_tag=${SULTAN_TAG}" >> "$GITHUB_OUTPUT"
          echo "ksu_ver=${KSU_VER}"       >> "$GITHUB_OUTPUT"

      - name: Integrate xxKSU
        working-directory: sultan
        run: |
          curl -LSs "https://raw.githubusercontent.com/${{ env.KSU_REPO }}/${{ env.KSU_BRANCH }}/kernel/setup.sh" | bash -s -- "${{ env.KSU_BRANCH }}"

      - name: Apply build-reproducibility patches
        working-directory: sultan
        run: |
          PATCHES=(../kernel_patches/sultan/60_scripts_mkcompile_h.patch ../kernel_patches/sultan/61_scripts_setlocalversion.patch ../kernel_patches/sultan/62_init_Makefile.patch)
          for patch in "${PATCHES[@]}"; do
            patch -p1 < "$patch"
          done

      - name: Build Kernel (Defconfig + Injection + Make)
        working-directory: sultan
        env:
          KBUILD_BUILD_USER: build-user
          KBUILD_BUILD_HOST: build-host
          CROSS_COMPILE: ${{ env.GCC_PATH }}
          CC: ${{ env.GCC_PATH }}gcc
        run: |
          # 1. Generate base config
          make O=out CROSS_COMPILE="$CROSS_COMPILE" CC="$CC" ${{ matrix.defconfig }}

          # 2. Inject Fortress Networking & ADDRTYPE Fixes
          EXTRA_CONFIGS=(
            CONFIG_NETFILTER_ADVANCED=y
            CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y
            CONFIG_IP_NF_MATCH_ADDRTYPE=y
            CONFIG_TCP_CONG_ADVANCED=y
            CONFIG_TCP_CONG_BBR=y
            CONFIG_DEFAULT_BBR=y
            CONFIG_NET_SCH_FQ=y
            CONFIG_IP_MULTIPLE_TABLES=y
            CONFIG_IPV6_MULTIPLE_TABLES=y
            CONFIG_IP_SET=y
            CONFIG_IP_SET_MAX=65534
            CONFIG_NETFILTER_XT_SET=y
            CONFIG_IP_SET_HASH_IP=y
            CONFIG_IP_SET_HASH_NET=y
            CONFIG_IP_SET_LIST_SET=y
            CONFIG_NETFILTER_XT_MATCH_OWNER=y
            CONFIG_NETFILTER_XT_MATCH_MARK=y
            CONFIG_NETFILTER_XT_TARGET_TPROXY=y
            CONFIG_NETFILTER_XT_TARGET_REDIRECT=y
            CONFIG_NETFILTER_XT_TARGET_TCPMSS=y
            CONFIG_IP_NF_TARGET_TTL=y
            CONFIG_IP_NF_MATCH_TTL=y
            CONFIG_NETFILTER_XT_TARGET_HL=y
            CONFIG_KSU=y
            CONFIG_KSU_TAMPER_SYSCALL_TABLE=y
          )

          for cfg in "${EXTRA_CONFIGS[@]}"; do
            key="${cfg%%=*}"
            sed -i "/${key}/d" out/.config
            echo "$cfg" >> out/.config
          done
          
          # 3. Final Compilation
          make O=out CROSS_COMPILE="$CROSS_COMPILE" CC="$CC" -j"$(nproc --all)"

      - name: Package
        id: package
        run: |
          cp sultan/out/arch/arm64/boot/Image.lz4 AK3/Image.lz4
          cat sultan/out/${{ matrix.dtb_path }}/*.dtb > AK3/dtb
          ZIP_NAME="Sultan-${{ matrix.codename }}-${{ steps.meta.outputs.sultan_tag }}-xxKSU-r${{ steps.meta.outputs.ksu_ver }}.zip"
          ( cd AK3 && zip -r9 "../${ZIP_NAME}" . -x "*.git*" )
          echo "zip_name=${ZIP_NAME}" >> "$GITHUB_OUTPUT"
          echo "ZIP_PATH=$GITHUB_WORKSPACE/${ZIP_NAME}" >> "$GITHUB_ENV"

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: Sultan-${{ matrix.codename }}-${{ steps.meta.outputs.sultan_tag }}
          path: ${{ env.ZIP_PATH }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          path: ./artifacts
      - name: Publish Release
        uses: softprops/action-gh-release@v2.6.1
        with:
          tag_name: "Build-$(date +'%Y.%m.%d-%H%M')"
          files: artifacts/**/*.zip
