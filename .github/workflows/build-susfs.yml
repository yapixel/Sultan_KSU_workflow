name: Build Sultan + xxKSU + SUSFS

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

env:
  ANYKERNEL_REPO: https://github.com/TheWildJames/AnyKernel3.git
  PATCHES_REPO: https://github.com/yapixel/kernel_patches
  SCRIPTS_REPO: https://github.com/TheSillyOk/sh
  KSU_BRANCH: master
  GCC_VERSION: "15.2.0"
  GCC_ARCHIVE_URL: "https://kernel.org/pub/tools/crosstool/files/bin/x86_64/15.2.0/x86_64-gcc-15.2.0-nolibc-aarch64-linux.tar.gz"

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      sultan_tag: ${{ steps.meta.outputs.sultan_tag }}
      ksu_ver: ${{ steps.meta.outputs.ksu_ver }}
      susfs_ver: ${{ steps.meta.outputs.susfs_ver }}
    strategy:
      fail-fast: false
      matrix:
        kernel:
          - codename: gs201
            kernel_repo: "https://github.com/yapixel/anaconda_kernel_google_tensynos"
            kernel_branch: "anaconda-tensynos-qpr3"
            anykernel_branch: "sultan-gs201"
            defconfig: gs201_defconfig
            dtb_path: "google-devices/gs201/dts"
          - codename: zuma
            kernel_repo: "https://github.com/yapixel/anaconda_kernel_google_tensynos"
            kernel_branch: "anaconda-tensynos-qpr3"
            anykernel_branch: "sultan-zuma"
            defconfig: zuma_defconfig
            dtb_path: "google-devices/zuma/dts"
          - codename: zumapro
            kernel_repo: "https://github.com/yapixel/anaconda_kernel_google_tensynos"
            kernel_branch: "anaconda-tensynos-qpr3"
            anykernel_branch: "sultan-zumapro"
            defconfig: zumapro_defconfig
            dtb_path: "google-devices/zumapro/dts"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install GCC ${{ env.GCC_VERSION }}
        run: |
          wget -q "${{ env.GCC_ARCHIVE_URL }}" -O gcc.tar.gz
          tar -xf gcc.tar.gz
          echo "TOOLCHAIN_PATH=$GITHUB_WORKSPACE/gcc-15.2.0-nolibc/aarch64-linux/bin/aarch64-linux-" >> $GITHUB_ENV

      - name: Clone source and dependencies
        run: |
          git clone --depth=1 "${{ matrix.kernel.kernel_repo }}" -b "${{ matrix.kernel.kernel_branch }}" sultan
          cd sultan
          git submodule update --init --recursive
          cd ..
          git clone --depth=1 "${{ env.ANYKERNEL_REPO }}" -b "${{ matrix.kernel.anykernel_branch }}" AK3
          git clone --depth=1 "${{ env.PATCHES_REPO }}" -b dev kernel_patches
          git clone --depth=1 "${{ env.SCRIPTS_REPO }}" sh

      - name: Apply build-reproducibility patches
        working-directory: sultan
        run: |
          PATCHES=(
            "../kernel_patches/sultan/60_scripts_mkcompile_h.patch"
            "../kernel_patches/sultan/61_scripts_setlocalversion.patch"
            "../kernel_patches/sultan/62_init_Makefile.patch"
          )
          for p in "${PATCHES[@]}"; do
            [ -f "$p" ] && patch -p1 < "$p" || echo "Optional patch $p skipped."
          done

      - name: Collect build metadata
        id: meta
        run: |
          S_TAG=$(git -C sultan rev-parse --short HEAD)
          chmod +x sh/get_ksuver.sh
          K_VER=$(./sh/get_ksuver.sh "backslashxx" "KernelSU" "${{ env.KSU_BRANCH }}" || echo "integrated")
          # Pull SUSFS version directly from the integrated kernel headers
          SU_VER=$(grep -m1 'define SUSFS_VERSION' sultan/include/linux/susfs.h | grep -oP '".*?"' | tr -d '"' || echo "integrated")
          
          echo "sultan_tag=${S_TAG}" >> "$GITHUB_OUTPUT"
          echo "ksu_ver=${K_VER}" >> "$GITHUB_OUTPUT"
          echo "susfs_ver=${SU_VER}" >> "$GITHUB_OUTPUT"

      - name: Integrate xxKSU Submodule
        run: |
          cd sultan
          if [ -d "drivers" ]; then DRIVER_DIR="drivers"; else DRIVER_DIR="common/drivers"; fi
          
          # Create symlink so the hierarchical build system finds the ksu.o Makefile
          ln -sf "$(realpath --relative-to="$DRIVER_DIR" "KernelSU/kernel")" "$DRIVER_DIR/kernelsu"
          
          # Link to parent drivers/Makefile and Kconfig
          grep -q "kernelsu" "$DRIVER_DIR/Makefile" || printf "\nobj-\$(CONFIG_KSU) += kernelsu/\n" >> "$DRIVER_DIR/Makefile"
          grep -q "source \"drivers/kernelsu/Kconfig\"" "$DRIVER_DIR/Kconfig" || sed -i "/endmenu/i\source \"drivers/kernelsu/Kconfig\"" "$DRIVER_DIR/Kconfig"
          
          echo "[+] Build tree linked to xxKSU submodule."

      - name: Setup atp4pixel Config Pillars
        run: |
          cd sultan
          DEFCONFIG="arch/arm64/configs/${{ matrix.kernel.defconfig }}"
          echo "" >> "$DEFCONFIG"
          # Merge verified repo config
          cat arch/arm64/configs/ksun_sus.config >> "$DEFCONFIG"

          # Inject atp4pixel Master Specification
          cat <<EOF >> "$DEFCONFIG"
          # Pillar 1: Advanced Networking
          CONFIG_NETFILTER_ADVANCED=y
          CONFIG_IP_NF_TARGET_TTL=y
          CONFIG_IP6_NF_TARGET_HL=y
          CONFIG_IP6_NF_MATCH_HL=y
          CONFIG_BPF_STREAM_PARSER=y
          CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y
          CONFIG_NETFILTER_XT_TARGET_TPROXY=y
          CONFIG_NETFILTER_XT_TARGET_REDIRECT=y
          CONFIG_NETFILTER_XT_MATCH_SOCKET=y
          CONFIG_NETFILTER_XT_MATCH_MARK=y
          CONFIG_NETFILTER_XT_MATCH_IPRANGE=y
          CONFIG_NETFILTER_XT_MATCH_OWNER=y
          CONFIG_NETFILTER_XT_MATCH_MAC=y
          CONFIG_NETFILTER_XT_MATCH_CONNTRACK=y
          CONFIG_NETFILTER_XT_MARK=y
          CONFIG_NETFILTER_XT_CONNMARK=y
          CONFIG_NETFILTER_XT_TARGET_CONNMARK=y
          CONFIG_IP6_NF_NAT=y
          CONFIG_IP6_NF_TARGET_REDIRECT=y
          CONFIG_IP6_NF_TARGET_MASQUERADE=y
          CONFIG_IP_MULTIPLE_TABLES=y
          CONFIG_IPV6_MULTIPLE_TABLES=y
          # Pillar 2: Google VPN (XFRM)
          CONFIG_XFRM_ALGO=y
          CONFIG_INET_IPCOMP=y
          CONFIG_INET_XFRM_TUNNEL=y
          CONFIG_INET_ESP=y
          CONFIG_XFRM_USER=y
          CONFIG_XFRM_SUB_POLICY=y
          CONFIG_INET_XFRM_MODE_TUNNEL=y
          CONFIG_XFRM_STATISTICS=y
          # Pillar 3: IPSet Suite
          CONFIG_IP_SET=y
          CONFIG_NETFILTER_XT_SET=y
          CONFIG_IP_SET_MAX=65534
          CONFIG_IP_SET_BITMAP_IP=y
          CONFIG_IP_SET_BITMAP_IPMAC=y
          CONFIG_IP_SET_BITMAP_PORT=y
          CONFIG_IP_SET_HASH_IP=y
          CONFIG_IP_SET_HASH_IPMARK=y
          CONFIG_IP_SET_HASH_IPPORT=y
          CONFIG_IP_SET_HASH_IPPORTIP=y
          CONFIG_IP_SET_HASH_IPPORTNET=y
          CONFIG_IP_SET_HASH_IPMAC=y
          CONFIG_IP_SET_HASH_MAC=y
          CONFIG_IP_SET_HASH_NETPORTNET=y
          CONFIG_IP_SET_HASH_NET=y
          CONFIG_IP_SET_HASH_NETNET=y
          CONFIG_IP_SET_HASH_NETPORT=y
          CONFIG_IP_SET_HASH_NETIFACE=y
          CONFIG_IP_SET_LIST_SET=y
          # Pillar 4: TCP BBR
          CONFIG_TCP_CONG_ADVANCED=y
          CONFIG_TCP_CONG_BBR=y
          CONFIG_NET_SCH_FQ=y
          CONFIG_DEFAULT_BBR=y
          # System Support
          CONFIG_SECURITY_NETWORK=y
          CONFIG_CGROUPS=y
          CONFIG_CGROUP_BPF=y
          CONFIG_CGROUP_SCHED=y
          CONFIG_CGROUP_PIDS=y
          CONFIG_CGROUP_FREEZER=y
          CONFIG_INOTIFY_USER=y
          EOF

          # Guardrails
          sed -i 's/CONFIG_TCP_CONG_BIC=y/CONFIG_TCP_CONG_BIC=n/' "$DEFCONFIG"
          sed -i 's/CONFIG_TCP_CONG_WESTWOOD=y/CONFIG_TCP_CONG_WESTWOOD=n/' "$DEFCONFIG"
          sed -i 's/CONFIG_TCP_CONG_HTCP=y/CONFIG_TCP_CONG_HTCP=n/' "$DEFCONFIG"
          sed -i 's/CONFIG_KPROBES=y/# CONFIG_KPROBES is not set/' "$DEFCONFIG"
          sed -i '/CONFIG_KPROBES/d' "$DEFCONFIG"
          echo "# CONFIG_KPROBES is not set" >> "$DEFCONFIG"
          echo "CONFIG_WERROR=n" >> "$DEFCONFIG"

      - name: Build Kernel (Production)
        working-directory: sultan
        env:
          KBUILD_BUILD_USER: build-user
          KBUILD_BUILD_HOST: build-host
          CROSS_COMPILE: ${{ env.TOOLCHAIN_PATH }}
          CC: ${{ env.TOOLCHAIN_PATH }}gcc
        run: |
          make O=out CROSS_COMPILE="$CROSS_COMPILE" CC="$CC" ${{ matrix.kernel.defconfig }}
          make O=out CROSS_COMPILE="$CROSS_COMPILE" CC="$CC" -j"$(nproc --all)"

      - name: Package AnyKernel3
        id: package
        run: |
          if [ -f sultan/out/arch/arm64/boot/Image.lz4 ]; then
            cp sultan/out/arch/arm64/boot/Image.lz4 AK3/Image.lz4
          else
            cp sultan/out/arch/arm64/boot/Image AK3/Image
          fi
          cat sultan/out/${{ matrix.kernel.dtb_path }}/*.dtb > AK3/dtb
          
          S_TAG="${{ steps.meta.outputs.sultan_tag }}"
          K_VER="${{ steps.meta.outputs.ksu_ver }}"
          SU_VER="${{ steps.meta.outputs.susfs_ver }}"
          
          ZIP_NAME="Sultan-${{ matrix.kernel.codename }}-${S_TAG}-xxKSU-r${K_VER}-SUSFS-${SU_VER}.zip"
          ( cd AK3 && zip -r9 "../${ZIP_NAME}" . -x "*.git*" )
          echo "ZIP_PATH=$GITHUB_WORKSPACE/${ZIP_NAME}" >> "$GITHUB_ENV"

      - name: Upload kernel ZIP
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.kernel.codename }}-kernel
          path: ${{ env.ZIP_PATH }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v8
        with:
          path: ./artifacts
          merge-multiple: true
      - name: Tag and Release
        env:
          GH_TOKEN: ${{ github.token }}
          K_VER: ${{ needs.build.outputs.ksu_ver }}
          SU_VER: ${{ needs.build.outputs.susfs_ver }}
          S_TAG: ${{ needs.build.outputs.sultan_tag }}
        run: |
          DATE=$(date +"%Y.%m.%d")
          MAX_REV=$(git tag -l "${DATE}-r*" | sed "s/${DATE}-r//" | sort -n | tail -n1)
          REV=$(( ${MAX_REV:-0} + 1 ))
          TAG="${DATE}-r${REV}"
          
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git tag "$TAG"
          git push origin "$TAG"
          
          gh release create "$TAG" artifacts/**/*.zip \
            --title "Kernel Build — $TAG" \
            --notes "
            ### 🚀 Build Information
            | Component | Details |
            | :--- | :--- |
            | **Kernel Base** | Sultan ($S_TAG) |
            | **Manager** | [backslashxx/KernelSU](https://github.com/backslashxx/KernelSU) |
            | **xxKSU Ver** | \`r$K_VER\` |
            | **SUSFS Ver** | \`$SU_VER\` |
            | **Compiler** | GCC 15.2.0 |
            
            ### 🛠️ Networking Features (Fortress)
            - **TCP Congestion:** BBR (v1) + FQ
            - **Routing:** Policy Routing (Table 1066) + IPSet (64k)
            - **Fixes:** ADDRTYPE Match, Google VPN (XFRM), TTL 64 Share
            
            > Built for Pixel 7, 8, and 9 Series."
