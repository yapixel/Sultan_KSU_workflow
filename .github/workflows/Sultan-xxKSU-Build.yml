name: Sultan-xxKSU-Build

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
  push:
    paths-ignore:
      - 'README.md'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        susfs: [false, true]
        build:
          - type: xxKSU
            ksu: true
            repo: "backslashxx/KernelSU"
            folder: "KernelSU"
            branch: "master"
            ak3_suffix: "_xxKSU"
        kernel:
          - codename: gs201
            repo: "android_kernel_google_tensynos"
            android_version: "android14"
            kernel_version: "6.1"
            defconfig: gs201_defconfig
            local_version: "-android14-11-gc1de4747ac59-ab14219743"
            build_date: "Mon Oct  6 16:50:48 UTC 2025"

    steps:
      - name: Download and extract GCC 14.2.0 toolchain
        run: |
          wget https://www.kernel.org/pub/tools/crosstool/files/bin/x86_64/14.2.0/x86_64-gcc-14.2.0-nolibc-aarch64-linux.tar.gz -O gcc.tar.gz
          gunzip gcc.tar.gz
          tar -xf gcc.tar
          echo "TOOLCHAIN_PATH=$GITHUB_WORKSPACE/gcc-14.2.0-nolibc/aarch64-linux/bin/aarch64-linux-" >> $GITHUB_ENV

      - name: Clone Dependencies and set ENV
        run: |
          ANYKERNEL_BRANCH="sultan-${{ matrix.kernel.codename }}"
          SUSFS_BRANCH="gki-${{ matrix.kernel.android_version }}-${{ matrix.kernel.kernel_version }}"

          sudo apt-get install -y --no-install-recommends ccache

          # Clone AnyKernel3
          git clone --depth=1 https://github.com/TheWildJames/AnyKernel3.git -b "$ANYKERNEL_BRANCH" AK3
          echo "ak3_dir=$PWD/AK3" >> $GITHUB_ENV

          # Clone YOUR yapixel repo where you synced the patches
          git clone --depth=1 https://github.com/yapixel/kernel_patches.git -b dev yapixel_patches
          echo "patch_dir=$PWD/yapixel_patches" >> $GITHUB_ENV

          if [[ "${{ matrix.susfs }}" == "true" ]]; then
            git clone --depth=5 https://gitlab.com/simonpunk/susfs4ksu.git -b "$SUSFS_BRANCH" susfs
            echo "susfs_dir=$PWD/susfs" >> $GITHUB_ENV
          fi

          git clone --depth=1 https://github.com/kerneltoast/${{ matrix.kernel.repo }} sultan
          echo "kernel_dir=$PWD/sultan" >> $GITHUB_ENV

          build_type="${{ matrix.build.ak3_suffix }}"
          [[ "${{ matrix.susfs }}" == "true" ]] && build_type="${build_type}-SUSFS" || build_type="${build_type}-NoSUSFS"
          echo "zip_name=$(date +"%d.%m.%Y")-${{ matrix.kernel.codename }}${build_type}-Sultan" >> $GITHUB_ENV

      - name: Sync xxKSU
        run: |
          cd "${{ env.kernel_dir }}"
          curl -LSs "https://raw.githubusercontent.com/${{ matrix.build.repo }}/${{ matrix.build.branch }}/kernel/setup.sh" | bash -s ${{ matrix.build.branch }}

      - name: Setup Kernel Configs
        run: |
          cd "${{ env.kernel_dir }}"

          if [[ "${{ matrix.susfs }}" != "true" ]]; then
            # Hookless mode for NoSUSFS — no kernel patching needed
            configs="CONFIG_KSU=y CONFIG_KSU_KPROBES_HOOK=n CONFIG_KSU_TAMPER_SYSCALL_TABLE=y CONFIG_KSU_LSM_SECURITY_HOOKS=y CONFIG_KSU_EXTRAS=y CONFIG_KSU_ALLOWLIST_WORKAROUND=n CONFIG_KSU_DEBUG=n CONFIG_KSU_THRONE_TRACKER_ALWAYS_THREADED=y CONFIG_TMPFS_XATTR=y CONFIG_TMPFS_POSIX_ACL=y CONFIG_IP_NF_TARGET_TTL=y CONFIG_IP6_NF_TARGET_HL=y CONFIG_IP6_NF_MATCH_HL=y CONFIG_TCP_CONG_BBR=y CONFIG_DEFAULT_BBR=y"
          else
            # Normal hook mode for SUSFS — scope patch + De-inlined patch handle the hooks
            configs="CONFIG_KSU=y CONFIG_TMPFS_XATTR=y CONFIG_TMPFS_POSIX_ACL=y CONFIG_IP_NF_TARGET_TTL=y CONFIG_IP6_NF_TARGET_HL=y CONFIG_IP6_NF_MATCH_HL=y CONFIG_TCP_CONG_BBR=y CONFIG_DEFAULT_BBR=y CONFIG_KSU_SUSFS=y CONFIG_KSU_SUSFS_SUS_PATH=y CONFIG_KSU_SUSFS_SUS_MOUNT=y CONFIG_KSU_SUSFS_SUS_KSTAT=y CONFIG_KSU_SUSFS_TRY_UMOUNT=y CONFIG_KSU_SUSFS_SPOOF_UNAME=y"
          fi

          for config in $configs; do
            config_name=$(echo "${config}" | cut -d "=" -f 1)
            sed -i -E "s/.*($config_name=.*)/# \1/gi" arch/arm64/configs/${{ matrix.kernel.defconfig }}
            echo -e "\n${config}" >> "arch/arm64/configs/${{ matrix.kernel.defconfig }}"
          done

      - name: Collect Patch Rejects
        if: failure()
        run: |
          mkdir -p /tmp/rejects
          find "${{ env.kernel_dir }}" -name "*.rej" -exec cp --parents {} /tmp/rejects/ \;
          echo "Rejects found:"
          find /tmp/rejects -type f
        continue-on-error: true

      - name: Upload Rejects Artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: patch-rejects
          path: /tmp/rejects/

      - name: Apply SUSFS Integration (De-inlined)
        if: matrix.susfs
        run: |
          # 1. Copy SUSFS core files
          cp ${{ env.susfs_dir }}/kernel_patches/fs/* ${{ env.kernel_dir }}/fs/
          cp ${{ env.susfs_dir }}/kernel_patches/include/linux/* ${{ env.kernel_dir }}/include/linux/

          # 2. Apply scope patch for exec/stat/open/reboot hooks
          cd "${{ env.kernel_dir }}"
          patch -p1 -F 3 < "${{ env.patch_dir }}/syscall_hook/scope-min-hooks-v1.9-sultan.patch"

          # 3. Patch xxKSU folder with De-inlined patch
          cd "${{ env.kernel_dir }}/${{ matrix.build.folder }}"
          patch -p1 -F 3 < "${{ env.patch_dir }}/xxksu/0001-xxKSU-kernel-implement-susfs-v2.1.0-De-inlined.patch"

          # 4. Patch main kernel tree
          cd "${{ env.kernel_dir }}"
          patch -p1 -F 3 < ${{ env.susfs_dir }}/kernel_patches/50_add_susfs_in_gki-${{ matrix.kernel.android_version }}-${{ matrix.kernel.kernel_version }}.patch || true

          # 5. Final sys.c fix
          patch -p1 -F 3 < "${{ env.patch_dir }}/sultan/sys.c_fix.patch"

      - name: Build Kernel
        run: |
          cd "${{ env.kernel_dir }}"
          export KBUILD_BUILD_USER="TheSillyOk"
          export KBUILD_BUILD_HOST="Github"

          make CROSS_COMPILE=${{ env.TOOLCHAIN_PATH }} CC="${{ env.TOOLCHAIN_PATH }}gcc" -j$(nproc --all) ${{ matrix.kernel.defconfig }}
          make CROSS_COMPILE=${{ env.TOOLCHAIN_PATH }} CC="${{ env.TOOLCHAIN_PATH }}gcc" -j$(nproc --all)

      - name: Setup AnyKernel3
        run: |
          cd "${{ env.kernel_dir }}"
          cp out/arch/arm64/boot/Image.lz4 ${{ env.ak3_dir }}/Image.lz4
          cat out/google-devices/${{ matrix.kernel.codename }}/dts/*.dtb > ${{ env.ak3_dir }}/dtb

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.zip_name }}
          path: ${{ env.ak3_dir }}/*
