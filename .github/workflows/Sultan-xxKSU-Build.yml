name: Sultan-xxKSU-SUSFS-Final-LSM

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        build:
          - type: xxKSU
            repo: "backslashxx/KernelSU"
            folder: "KernelSU"
            branch: "master"
        kernel:
          - codename: gs201
            repo: "android_kernel_google_tensynos"
            android_version: "android14"
            kernel_version: "6.1"
            defconfig: gs201_defconfig

    steps:
      - name: Toolchain Setup
        run: |
          wget https://www.kernel.org/pub/tools/crosstool/files/bin/x86_64/14.2.0/x86_64-gcc-14.2.0-nolibc-aarch64-linux.tar.gz -O gcc.tar.gz
          tar -xf gcc.tar.gz
          echo "TOOLCHAIN_PATH=$GITHUB_WORKSPACE/gcc-14.2.0-nolibc/aarch64-linux/bin/aarch64-linux-" >> $GITHUB_ENV

      - name: Clone Source
        run: |
          git clone --depth=1 https://github.com/TheWildJames/AnyKernel3.git -b sultan-${{ matrix.kernel.codename }} AK3
          git clone --depth=1 https://github.com/yapixel/kernel_patches.git -b dev yapixel_patches
          git clone --depth=1 https://gitlab.com/simonpunk/susfs4ksu.git -b sultan-shiba-susfs-minimal susfs
          git clone --depth=1 https://github.com/kerneltoast/${{ matrix.kernel.repo }} sultan
          echo "kernel_dir=$PWD/sultan" >> $GITHUB_ENV

      - name: Sync xxKSU and Apply De-inlined SUSFS
        run: |
          cd sultan
          curl -LSs "https://raw.githubusercontent.com/backslashxx/KernelSU/master/kernel/setup.sh" | bash -s ${{ matrix.build.branch }}
          cd KernelSU
          patch -p1 < "../../yapixel_patches/xxksu/0002-xxKSU-kernel-implement-susfs-v2.1.0-De-inlined.patch"

      - name: Setup Kernel Configs
        run: |
          cd sultan
          configs="CONFIG_KSU=y \
                   CONFIG_KSU_LSM_SECURITY_HOOKS=y \
                   CONFIG_KSU_TAMPER_SYSCALL_TABLE=n \
                   CONFIG_KSU_KPROBES_HOOK=n \
                   CONFIG_KSU_SUSFS=y \
                   CONFIG_KSU_SUSFS_SUS_PATH=y \
                   CONFIG_KSU_SUSFS_SUS_MOUNT=y \
                   CONFIG_KSU_SUSFS_SUS_KSTAT=y \
                   CONFIG_KSU_SUSFS_SPOOF_UNAME=y \
                   CONFIG_KSU_SUSFS_OPEN_REDIRECT=y \
                   CONFIG_WERROR=n \
                   CONFIG_TMPFS_XATTR=y \
                   CONFIG_TMPFS_POSIX_ACL=y"

          for config in $configs; do
            echo -e "\n${config}" >> "arch/arm64/configs/${{ matrix.kernel.defconfig }}"
          done

          # Sultan optimization: KPROBES break things here
          sed -i 's/CONFIG_KPROBES=y/# CONFIG_KPROBES is not set/' arch/arm64/configs/${{ matrix.kernel.defconfig }}
          sed -i '/CONFIG_KPROBES/d' arch/arm64/configs/${{ matrix.kernel.defconfig }}

      - name: Apply SUSFS Base Patch
        run: |
          cd sultan
          cp ../susfs/kernel_patches/fs/* fs/ || true
          cp ../susfs/kernel_patches/include/linux/* include/linux/ || true
          patch -p1 --fuzz=6 < ../susfs/kernel_patches/50_add_susfs_in_gki-android14-6.1.patch || true

      - name: Build kernel
        working-directory: sultan
        env:
          CROSS_COMPILE: ${{ env.TOOLCHAIN_PATH }}
          CC: ${{ env.TOOLCHAIN_PATH }}gcc
          KBUILD_BUILD_USER: build-user
          KBUILD_BUILD_HOST: build-host
        run: |
          make O=out CROSS_COMPILE="$CROSS_COMPILE" CC="$CC" ${{ matrix.kernel.defconfig }}
          make O=out CROSS_COMPILE="$CROSS_COMPILE" CC="$CC" -j"$(nproc --all)"

      - name: Setup AnyKernel3
        run: |
          cd sultan/out
          if [ -f arch/arm64/boot/Image.lz4 ]; then
            cp arch/arm64/boot/Image.lz4 ../../AK3/Image.lz4
          elif [ -f arch/arm64/boot/Image ]; then
            cp arch/arm64/boot/Image ../../AK3/Image
          fi
          find . -name "*.dtb" -exec cat {} + > ../../AK3/dtb || true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.kernel.codename }}-Sultan-xxKSU-SUSFS-Final
          path: AK3/*
