name: Sultan-xxKSU-SUSFS-Final-LSM

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        build:
          - type: xxKSU
            repo: "backslashxx/KernelSU"
            folder: "KernelSU"
            branch: "master"
        kernel:
          - codename: gs201
            repo: "android_kernel_google_tensynos"
            android_version: "android14"
            kernel_version: "6.1"
            defconfig: gs201_defconfig

    steps:
      - name: Toolchain Setup
        run: |
          wget https://www.kernel.org/pub/tools/crosstool/files/bin/x86_64/14.2.0/x86_64-gcc-14.2.0-nolibc-aarch64-linux.tar.gz -O gcc.tar.gz
          tar -xf gcc.tar.gz
          echo "TOOLCHAIN_PATH=$GITHUB_WORKSPACE/gcc-14.2.0-nolibc/aarch64-linux/bin/aarch64-linux-" >> $GITHUB_ENV

      - name: Clone Source
        run: |
          git clone --depth=1 https://github.com/TheWildJames/AnyKernel3.git -b sultan-${{ matrix.kernel.codename }} AK3
          git clone --depth=1 https://github.com/yapixel/kernel_patches.git -b dev yapixel_patches
          git clone --depth=1 https://gitlab.com/simonpunk/susfs4ksu.git -b sultan-shiba-susfs-minimal susfs
          git clone --depth=1 https://github.com/kerneltoast/${{ matrix.kernel.repo }} sultan
          echo "kernel_dir=$PWD/sultan" >> $GITHUB_ENV

      - name: Sync xxKSU and Apply De-inlined SUSFS
        run: |
          cd sultan
          curl -LSs "https://raw.githubusercontent.com/backslashxx/KernelSU/master/kernel/setup.sh" | bash -s ${{ matrix.build.branch }}

          cd KernelSU
          # Apply the De-inlined SUSFS v2.1.0 patch
          patch -p1 < "../../yapixel_patches/xxksu/0001-xxKSU-kernel-implement-susfs-v2.1.0-De-inlined.patch"

      - name: Setup Kernel Configs
        run: |
          cd sultan
          configs="CONFIG_KSU=y \
                   CONFIG_KSU_KPROBES_HOOK=n \
                   CONFIG_KSU_KPROBES_KSUD=n \
                   CONFIG_KSU_LSM_SECURITY_HOOKS=y \
                   CONFIG_KSU_SUSFS=y \
                   CONFIG_KSU_SUSFS_SUS_PATH=y \
                   CONFIG_KSU_SUSFS_SUS_MOUNT=y \
                   CONFIG_KSU_SUSFS_SUS_KSTAT=y \
                   CONFIG_KSU_SUSFS_TRY_UMOUNT=n \
                   CONFIG_KSU_SUSFS_SPOOF_UNAME=y \
                   CONFIG_KSU_SUSFS_OPEN_REDIRECT=y \
                   CONFIG_KSU_DEBUG=y \
                   CONFIG_WERROR=n \
                   CONFIG_TMPFS_XATTR=y \
                   CONFIG_TMPFS_POSIX_ACL=y \
                   CONFIG_IP_NF_TARGET_TTL=y \
                   CONFIG_IP6_NF_TARGET_HL=y \
                   CONFIG_IP6_NF_MATCH_HL=y \
                   CONFIG_TCP_CONG_ADVANCED=y \
                   CONFIG_TCP_CONG_BBR=y \
                   CONFIG_NET_SCH_FQ=y \
                   CONFIG_IP_SET=y \
                   CONFIG_NETFILTER_XT_SET=y \
                   CONFIG_IP_SET_MAX=65534 \
                   CONFIG_IP_SET_BITMAP_IP=y \
                   CONFIG_IP_SET_BITMAP_IPMAC=y \
                   CONFIG_IP_SET_BITMAP_PORT=y \
                   CONFIG_IP_SET_HASH_IP=y \
                   CONFIG_IP_SET_HASH_IPMARK=y \
                   CONFIG_IP_SET_HASH_IPPORT=y \
                   CONFIG_IP_SET_HASH_IPPORTIP=y \
                   CONFIG_IP_SET_HASH_IPPORTNET=y \
                   CONFIG_IP_SET_HASH_IPMAC=y \
                   CONFIG_IP_SET_HASH_MAC=y \
                   CONFIG_IP_SET_HASH_NETPORTNET=y \
                   CONFIG_IP_SET_HASH_NET=y \
                   CONFIG_IP_SET_HASH_NETNET=y \
                   CONFIG_IP_SET_HASH_NETPORT=y \
                   CONFIG_IP_SET_HASH_NETIFACE=y \
                   CONFIG_IP_SET_LIST_SET=y \
                   CONFIG_NETFILTER_XT_TARGET_TPROXY=y \
                   CONFIG_NETFILTER_XT_TARGET_REDIRECT=y \
                   CONFIG_NETFILTER_XT_MATCH_SOCKET=y \
                   CONFIG_NETFILTER_XT_MATCH_MARK=y \
                   CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y \
                   CONFIG_NETFILTER_XT_MATCH_IPRANGE=y \
                   CONFIG_NETFILTER_XT_MATCH_OWNER=y \
                   CONFIG_NETFILTER_XT_MATCH_MAC=y \
                   CONFIG_NETFILTER_XT_MATCH_CONNTRACK=y \
                   CONFIG_NETFILTER_XT_MARK=y \
                   CONFIG_NETFILTER_XT_CONNMARK=y \
                   CONFIG_NETFILTER_XT_TARGET_CONNMARK=y \
                   CONFIG_IP6_NF_NAT=y \
                   CONFIG_IP6_NF_TARGET_REDIRECT=y"

          for config in $configs; do
            echo -e "\n${config}" >> "arch/arm64/configs/${{ matrix.kernel.defconfig }}"
          done

          # Force KPROBES OFF (Sultan requirement)
          sed -i 's/CONFIG_KPROBES=y/# CONFIG_KPROBES is not set/' arch/arm64/configs/${{ matrix.kernel.defconfig }}
          sed -i '/CONFIG_KPROBES/d' arch/arm64/configs/${{ matrix.kernel.defconfig }}

      - name: Debug Sultan pre-existing hooks
        run: |
         echo "=== ksu_init_rc_hook in sultan source ==="
         grep -rn "ksu_init_rc_hook" sultan/fs/ sultan/kernel/ || true
         echo "=== ksu_handle_sys_read in sultan source ==="
         grep -rn "ksu_handle_sys_read" sultan/fs/ sultan/kernel/ || true
         echo "=== ksu_handle_vfs_fstat in sultan source ==="
         grep -rn "ksu_handle_vfs_fstat" sultan/fs/ sultan/kernel/ || true
         echo "=== ksu_handle_setresuid in sultan source (pre-patch) ==="
         grep -rn "ksu_handle_setresuid" sultan/kernel/sys.c || true
         echo "=== ksu_handle_devpts in sultan source (pre-patch) ==="
         grep -rn "ksu_handle_devpts" sultan/fs/devpts/ || true

      - name: Apply Kernel Source Patches and Fixes
        run: |
          cd sultan

          # Copy SUSFS core files
          cp ../susfs/kernel_patches/fs/* fs/ || true
          cp ../susfs/kernel_patches/include/linux/* include/linux/ || true

          # Apply the big SUSFS base integration patch (high fuzz for Sultan offsets)
          patch -p1 --fuzz=6 < ../susfs/kernel_patches/50_add_susfs_in_gki-android14-6.1.patch || true
          
          # FIXED: Ensure the De-inlined 'kernel/' subdir is built by KernelSU's Makefile
          if ! grep -q "obj-y += kernel/" KernelSU/Makefile 2>/dev/null; then
            echo "obj-y += kernel/" >> KernelSU/Makefile || true
          fi

      - name: De-inlined + No-KPROBES Compatibility Fixes
        run: |
          cd sultan
          
          # Safely convert -Werror=flag to -Wflag, and remove standalone -Werror
          sed -i 's/-Werror=/-W/g' Makefile arch/arm64/Makefile 2>/dev/null || true
          sed -i 's/ -Werror / /g' Makefile arch/arm64/Makefile 2>/dev/null || true

      - name: Build kernel
        working-directory: sultan
        env:
          CROSS_COMPILE: ${{ env.TOOLCHAIN_PATH }}
          CC: ${{ env.TOOLCHAIN_PATH }}gcc
          KBUILD_BUILD_USER: build-user
          KBUILD_BUILD_HOST: build-host
        run: |
          make O=out CROSS_COMPILE="$CROSS_COMPILE" CC="$CC" ${{ matrix.kernel.defconfig }}
          make O=out CROSS_COMPILE="$CROSS_COMPILE" CC="$CC" -j"$(nproc --all)"

      - name: Setup AnyKernel3
        run: |
          cd sultan/out
          if [ -f arch/arm64/boot/Image.lz4 ]; then
            cp arch/arm64/boot/Image.lz4 ../../AK3/Image.lz4
          elif [ -f arch/arm64/boot/Image ]; then
            cp arch/arm64/boot/Image ../../AK3/Image
          fi
          # Combine dtbs if present
          find . -name "*.dtb" -exec cat {} + > ../../AK3/dtb || true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.kernel.codename }}-Sultan-xxKSU-SUSFS-Final
          path: AK3/*
