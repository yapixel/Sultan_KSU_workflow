name: Sultan-xxKSU-SUSFS-Final-LSM

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        build:
          - type: xxKSU
            repo: "backslashxx/KernelSU"
            folder: "KernelSU"
            branch: "master"
        kernel:
          - codename: gs201
            repo: "android_kernel_google_tensynos"
            android_version: "android14"
            kernel_version: "6.1"
            defconfig: gs201_defconfig

    steps:
      - name: Toolchain Setup
        run: |
          wget https://www.kernel.org/pub/tools/crosstool/files/bin/x86_64/14.2.0/x86_64-gcc-14.2.0-nolibc-aarch64-linux.tar.gz -O gcc.tar.gz
          tar -xf gcc.tar.gz
          echo "TOOLCHAIN_PATH=$GITHUB_WORKSPACE/gcc-14.2.0-nolibc/aarch64-linux/bin/aarch64-linux-" >> $GITHUB_ENV

      - name: Clone Source
        run: |
          git clone --depth=1 https://github.com/TheWildJames/AnyKernel3.git -b sultan-${{ matrix.kernel.codename }} AK3
          git clone --depth=1 https://github.com/yapixel/kernel_patches.git -b dev yapixel_patches
          git clone --depth=1 https://gitlab.com/simonpunk/susfs4ksu.git -b sultan-shiba-susfs-minimal susfs
          git clone --depth=1 https://github.com/kerneltoast/${{ matrix.kernel.repo }} sultan
          echo "kernel_dir=$PWD/sultan" >> $GITHUB_ENV

      - name: Sync xxKSU and Apply De-inlined SUSFS
        run: |
          cd sultan
          curl -LSs "https://raw.githubusercontent.com/backslashxx/KernelSU/master/kernel/setup.sh" | bash -s ${{ matrix.build.branch }}
          cd KernelSU
          patch -p1 < "../../yapixel_patches/xxksu/0001-xxKSU-kernel-implement-susfs-v2.1.0-De-inlined.patch"

      - name: Setup Kernel Configs
        run: |
          cd sultan
          configs="CONFIG_KSU=y \
                   CONFIG_KSU_LSM_SECURITY_HOOKS=y \
                   CONFIG_KSU_SUSFS=y \
                   CONFIG_KSU_SUSFS_SUS_PATH=y \
                   CONFIG_KSU_SUSFS_SUS_MOUNT=y \
                   CONFIG_KSU_SUSFS_SUS_KSTAT=y \
                   CONFIG_KSU_SUSFS_SPOOF_UNAME=y \
                   CONFIG_KSU_SUSFS_OPEN_REDIRECT=y \
                   CONFIG_WERROR=n \
                   CONFIG_TMPFS_XATTR=y \
                   CONFIG_TMPFS_POSIX_ACL=y"

          for config in $configs; do
            echo -e "\n${config}" >> "arch/arm64/configs/${{ matrix.kernel.defconfig }}"
          done

          # Sultan optimization: KPROBES break things here
          sed -i 's/CONFIG_KPROBES=y/# CONFIG_KPROBES is not set/' arch/arm64/configs/${{ matrix.kernel.defconfig }}
          sed -i '/CONFIG_KPROBES/d' arch/arm64/configs/${{ matrix.kernel.defconfig }}

      - name: Linker & Modular Source Fixups
        run: |
          cd sultan
          
          # 1. Apply SUSFS Base Patch
          cp ../susfs/kernel_patches/fs/* fs/ || true
          cp ../susfs/kernel_patches/include/linux/* include/linux/ || true
          patch -p1 --fuzz=6 < ../susfs/kernel_patches/50_add_susfs_in_gki-android14-6.1.patch || true

          # 2. Update Makefiles
          if [ -f KernelSU/Makefile ]; then
            sed -i '/obj-y += kernel\//d' KernelSU/Makefile
            echo "obj-y += kernel/" >> KernelSU/Makefile
          fi
          if [ -f KernelSU/kernel/Makefile ]; then
            # Build the runtime objects
            sed -i 's/obj-$(CONFIG_KSU) := ksu.o/obj-$(CONFIG_KSU) := ksu.o runtime\/ksud.o/g' KernelSU/kernel/Makefile
          fi

          # 3. Fix Function Mapping & Visibility
          KSUD_H="KernelSU/kernel/runtime/ksud.h"
          KSUD_C="KernelSU/kernel/runtime/ksud.c"

          # Strip 'static' from both files so they are globally accessible
          sed -i 's/static noinline/noinline/g' "$KSUD_H" "$KSUD_C" || true
          sed -i 's/static inline/noinline/g' "$KSUD_C" || true

          # Bridge the gap: Map the functions the 50-patch wants to what exists in ksud.c
          # Note: your ksud.c uses 'ksu_handle_sys_read_fd', SUSFS wants 'ksu_handle_sys_read'
          echo "void ksu_handle_sys_read(unsigned int fd) { ksu_handle_sys_read_fd(fd); }" >> "$KSUD_C"
          
          # Add a stub for setresuid if it's missing (to satisfy linker)
          echo "int ksu_handle_setresuid(uid_t ruid, uid_t euid, uid_t suid) { return 0; }" >> "$KSUD_C"
          
          # Ensure prototypes are in the header for the linker
          cat <<EOF >> "$KSUD_H"
           extern void ksu_handle_sys_read(unsigned int fd);
           extern int ksu_handle_setresuid(uid_t ruid, uid_t euid, uid_t suid);
           extern void ksu_handle_vfs_fstat(int fd, loff_t *kstat_size_ptr);
           extern int ksu_handle_devpts(struct inode *inode);
           extern int ksu_handle_input_handle_event(unsigned int *type, unsigned int *code, int *value);
          EOF

          # 4. Sultan LTO Variable Alignment
          # Use xargs to handle multiple files safely
          find KernelSU/kernel -name "*.c" -o -name "*.h" | xargs sed -i 's/bool ksu_execveat_hook/bool ksu_execveat_hook __read_mostly/g' || true
          find KernelSU/kernel -name "*.c" -o -name "*.h" | xargs sed -i 's/bool ksu_su_compat_enabled/bool ksu_su_compat_enabled __read_mostly/g' || true

      - name: Build kernel
        working-directory: sultan
        env:
          CROSS_COMPILE: ${{ env.TOOLCHAIN_PATH }}
          CC: ${{ env.TOOLCHAIN_PATH }}gcc
          KBUILD_BUILD_USER: build-user
          KBUILD_BUILD_HOST: build-host
        run: |
          make O=out CROSS_COMPILE="$CROSS_COMPILE" CC="$CC" ${{ matrix.kernel.defconfig }}
          make O=out CROSS_COMPILE="$CROSS_COMPILE" CC="$CC" -j"$(nproc --all)"

      - name: Setup AnyKernel3
        run: |
          cd sultan/out
          if [ -f arch/arm64/boot/Image.lz4 ]; then
            cp arch/arm64/boot/Image.lz4 ../../AK3/Image.lz4
          elif [ -f arch/arm64/boot/Image ]; then
            cp arch/arm64/boot/Image ../../AK3/Image
          fi
          find . -name "*.dtb" -exec cat {} + > ../../AK3/dtb || true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.kernel.codename }}-Sultan-xxKSU-SUSFS-Final
          path: AK3/*

