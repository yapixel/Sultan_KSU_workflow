name: Sultan-xxKSU-Manual-NoUnity

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        susfs: [true]
        build:
          - type: xxKSU
            repo: "backslashxx/KernelSU"
            folder: "KernelSU"
            branch: "master"
        kernel:
          - codename: gs201
            repo: "android_kernel_google_tensynos"
            android_version: "android14"
            kernel_version: "6.1"
            defconfig: gs201_defconfig

    steps:
      - name: Toolchain Setup
        run: |
          wget https://www.kernel.org/pub/tools/crosstool/files/bin/x86_64/14.2.0/x86_64-gcc-14.2.0-nolibc-aarch64-linux.tar.gz -O gcc.tar.gz
          tar -xf gcc.tar.gz
          echo "TOOLCHAIN_PATH=$GITHUB_WORKSPACE/gcc-14.2.0-nolibc/aarch64-linux/bin/aarch64-linux-" >> $GITHUB_ENV

      - name: Clone Source
        run: |
          git clone --depth=1 https://github.com/TheWildJames/AnyKernel3.git -b sultan-${{ matrix.kernel.codename }} AK3
          git clone --depth=1 https://github.com/yapixel/kernel_patches.git -b dev yapixel_patches
          git clone --depth=5 https://gitlab.com/simonpunk/susfs4ksu.git -b gki-${{ matrix.kernel.android_version }}-${{ matrix.kernel.kernel_version }} susfs
          git clone --depth=1 https://github.com/kerneltoast/${{ matrix.kernel.repo }} sultan
          echo "kernel_dir=$PWD/sultan" >> $GITHUB_ENV

      - name: Sync and Fix xxKSU (Standard Build)
        run: |
          cd sultan
          curl -LSs "https://raw.githubusercontent.com/${{ matrix.build.repo }}/${{ matrix.build.branch }}/kernel/setup.sh" | bash -s ${{ matrix.build.branch }}
          
          cd KernelSU
          # 1. Apply De-inlined SUSFS patch
          patch -p1 < "../../yapixel_patches/xxksu/0001-xxKSU-kernel-implement-susfs-v2.1.0-De-inlined.patch"
          
          # 2. Convert Makefile from Unity Build to Standard Build
          # This removes the single unit CFLAGS and allows multi-object compilation
          sed -i 's/obj-$(CONFIG_KSU) := ksu.o/obj-$(CONFIG_KSU) += KernelSU.o\nKernelSU-y := ksu.o allowlist.o manager.o/g' Makefile || true
          
          # 3. Force Manual Hook definitions in the source
          sed -i 's/static int ksu_handle/int ksu_handle/g' kernel/ksu.c || true
          sed -i 's/static void ksu_handle/void ksu_handle/g' kernel/ksu.c || true
          sed -i 's/defined(CONFIG_KSU_KPROBES_HOOK)/0/g' kernel/ksu.c || true

      - name: Setup Kernel Configs
        run: |
          cd sultan
          # Disable KPROBES to ensure static manual hook linkage
          configs="CONFIG_KSU=y CONFIG_KSU_KPROBES_HOOK=n CONFIG_KSU_LSM_SECURITY_HOOKS=y CONFIG_KSU_SUSFS=y CONFIG_KSU_SUSFS_OPEN_REDIRECT=y"
          for config in $configs; do
            echo -e "\n${config}" >> "arch/arm64/configs/${{ matrix.kernel.defconfig }}"
          done
          sed -i 's/CONFIG_KPROBES=y/# CONFIG_KPROBES is not set/' arch/arm64/configs/${{ matrix.kernel.defconfig }}

      - name: Apply Kernel Source Patches
        run: |
          cd sultan
          # 1. Apply Scope Hooks
          patch -p1 < ../yapixel_patches/syscall_hook/scope-min-hooks-v1.9-sultan.patch
          
          # 2. GKI 6.1 Type Fix
          sed -i 's/const char \*\*filename_user/struct filename \*\*filename/g' fs/stat.c || true
          
          # 3. SUSFS Kernel Side
          cp ../susfs/kernel_patches/fs/* fs/
          cp ../susfs/kernel_patches/include/linux/* include/linux/
          patch -p1 < ../susfs/kernel_patches/50_add_susfs_in_gki-${{ matrix.kernel.android_version }}-${{ matrix.kernel.kernel_version }}.patch || true
          
          # 4. Sultan Werror Fixes
          echo "CFLAGS_open.o += -Wno-unused-variable -Wno-unused-but-set-variable" >> fs/Makefile
          echo "CFLAGS_stat.o += -Wno-incompatible-pointer-types" >> fs/Makefile

      - name: Build Kernel
        run: |
          cd sultan
          # Ensure KernelSU is explicitly linked in the top-level Makefile
          if ! grep -q "obj-y += KernelSU/" Makefile; then
            echo "obj-y += KernelSU/" >> Makefile
          fi
          make CROSS_COMPILE=${{ env.TOOLCHAIN_PATH }} CC="${{ env.TOOLCHAIN_PATH }}gcc" -j$(nproc --all) O=out ${{ matrix.kernel.defconfig }}
          make CROSS_COMPILE=${{ env.TOOLCHAIN_PATH }} CC="${{ env.TOOLCHAIN_PATH }}gcc" -j$(nproc --all) O=out

      - name: Setup AnyKernel3
        run: |
          cd sultan/out
          cp arch/arm64/boot/Image.lz4 ../../AK3/Image.lz4
          cat google-devices/${{ matrix.kernel.codename }}/dts/*.dtb > ../../AK3/dtb

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.kernel.codename }}-Sultan-NoUnity
          path: AK3/*
